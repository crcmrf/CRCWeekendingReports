<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekend Reports - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 20px auto; border: 2px solid #000; }
        .header { text-align: center; border-bottom: 2px solid #000; position: relative; padding: 10px; }
        .header h1 { margin: 5px 0; font-size: 28px; }
        .grid-row { display: flex; border-bottom: 1px solid #000; }
        .label { width: 30%; font-weight: bold; background: #fff; padding: 10px; border-right: 1px solid #000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .input-area { width: 70%; padding: 10px; }
        .sub-grid { display: grid; grid-template-columns: 120px 1fr; gap: 5px; }
        input[type="text"], input[type="date"], select, textarea { width: 100%; box-sizing: border-box; padding: 5px; }
        textarea { height: 60px; resize: vertical; }
        .footer-buttons { display: flex; }
        .btn { width: 50%; padding: 15px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; text-align: center; }
        .btn-save { background-color: #e0e0e0; border-right: 1px solid #000; }
        .btn-submit { background-color: #fffde0; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<form id="reportForm">
    <div class="header">
        <h1>Weekend Reports - Admin</h1>
    </div>

    <!-- Date & Site -->
    <div class="grid-row">
        <div class="label">Date (Week Ending):</div>
        <div class="input-area"><input type="date" id="date" required></div>
    </div>
    <div class="grid-row">
        <div class="label">Site:</div>
        <div class="input-area">
            <select id="site" required>
                <option value="">Pick Site</option>
                <option value="PTS">PTS</option>
                <option value="STS">STS</option>
                <option value="GTS">GTS</option>
                <option value="BTS">BTS</option>
                <option value="BBS">BBS</option>
            </select>
        </div>
    </div>

    <!-- Transaction Numbers -->
    <div class="grid-row">
        <div class="label">Transaction Numbers</div>
        <div class="input-area sub-grid">
            <label>Saturday:</label><input type="text" id="satTrans">
            <label>Sunday:</label><input type="text" id="sunTrans">
            <label>Weekly total:</label><input type="text" id="totalTrans" placeholder="(Mon - Sun)">
        </div>
    </div>

    <!-- Revenue -->
    <div class="grid-row">
        <div class="label">Revenue</div>
        <div class="input-area sub-grid">
            <label>Saturday:</label><input type="text" id="satRev">
            <label>Sunday:</label><input type="text" id="sunRev">
            <label>Weekly total:</label><input type="text" id="totalRev" placeholder="(Mon - Sun)">
        </div>
    </div>

    <!-- Text Sections -->
    <div class="grid-row">
        <div class="label">Incidents & Details</div>
        <div class="input-area"><textarea id="incidents"></textarea></div>
    </div>
    <div class="grid-row">
        <div class="label">HR Matters<br><small style="font-size:10px; font-weight:normal;">Staff wellbeing, Code of conduct, unplanned leave etc.</small></div>
        <div class="input-area"><textarea id="hrMatters"></textarea></div>
    </div>

    <!-- Buy Back Movements -->
    <div class="grid-row">
        <div class="label">Buy Back Movements</div>
        <div class="input-area">
            <div class="sub-grid" style="margin-bottom: 5px;">
                <label>Tones:</label><input type="text" id="buyBackTones">
            </div>
            <textarea id="buyBackNotes"></textarea>
        </div>
    </div>

    <!-- ADHOC & Extras -->
    <div class="grid-row">
        <div class="label">ADHOC Tasks<br><small style="font-size:10px; font-weight:normal;">i.e. non-ferrous, water meter stripping, fert bag loading</small></div>
        <div class="input-area"><textarea id="adhocTasks"></textarea></div>
    </div>
    <div class="grid-row">
        <div class="label">Any Issues?</div>
        <div class="input-area"><textarea id="anyIssues"></textarea></div>
    </div>
    <div class="grid-row">
        <div class="label">Anything Extra</div>
        <div class="input-area"><textarea id="anythingExtra"></textarea></div>
    </div>

    <!-- Form Footer Buttons -->
    <div class="footer-buttons">
        <button type="button" class="btn btn-save" onclick="sendData('Saved for Later')">Save for Later</button>
        <button type="button" class="btn btn-submit" onclick="sendData('Submitted')">Submit Weekending Report</button>
    </div>
</form>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyQ83v4NMqr--yQPitl9qWyh5ntfPvekiqOM30KMMU3dO2aj_mRJpTzMlViJeQRbkNz/exec';

// Create a visual status indicator element dynamically under the title
const formElement = document.getElementById('reportForm');
const statusBanner = document.createElement('div');
statusBanner.id = 'statusBanner';
statusBanner.style.cssText = 'text-align: center; font-weight: bold; padding: 10px; margin: 10px; border-radius: 4px; display: none;';
formElement.insertBefore(statusBanner, formElement.children[1]); // Inserts right below the header

// Listen for updates on both Date and Site fields
document.getElementById('date').addEventListener('change', handleDateChange);
document.getElementById('site').addEventListener('change', handleSiteChange);

function handleDateChange() {
    const dateInput = document.getElementById('date');
    const selectedDate = dateInput.value;
    
    if (!selectedDate) {
        hideStatus();
        return;
    }

    // Sunday validation check
    const dateObj = new Date(selectedDate);
    const dayOfWeek = dateObj.getUTCDay(); 

    if (dayOfWeek !== 0) {
        alert('Validation Error: Weekend Reports can only be submitted for Sundays (Week Ending). Please select a valid Sunday.');
        dateInput.value = ''; 
        resetFormFields();    
        hideStatus();
        return;
    }

    // Reset fields and check backend
    resetFormFields();
    checkExistingData();
}

function handleSiteChange() {
    // Reset fields and check backend immediately when changing the site dropdown
    resetFormFields();
    checkExistingData();
}

// Function to clear all input data fields following the "Site" selector
function resetFormFields() {
    const fieldsToClear = [
        'satTrans', 'sunTrans', 'totalTrans', 
        'satRev', 'sunRev', 'totalRev', 
        'incidents', 'hrMatters', 'buyBackTones', 
        'buyBackNotes', 'adhocTasks', 'anyIssues', 'anythingExtra'
    ];
    
    fieldsToClear.forEach(id => {
        const element = document.getElementById(id);
        if (element) element.value = '';
    });
}

// Visual status helpers
function showStatus(text, bgColor, textColor) {
    statusBanner.innerText = text;
    statusBanner.style.backgroundColor = bgColor;
    statusBanner.style.color = textColor;
    statusBanner.style.display = 'block';
}

function hideStatus() {
    statusBanner.style.display = 'none';
}

function checkExistingData() {
    const dateVal = document.getElementById('date').value;
    const siteVal = document.getElementById('site').value;

    // Only scan if both parameters are actively selected
    if (!dateVal || !siteVal) {
        hideStatus();
        return;
    }

    // 1. Show Loading State
    showStatus("🔍 Looking for existing data...", "#e3f2fd", "#0d47a1");

    fetch(`${GOOGLE_SCRIPT_URL}?date=${dateVal}&site=${encodeURIComponent(siteVal)}`)
    .then(response => response.json())
    .then(data => {
        if (data.found) {
            // 2. Found Data State
            showStatus(`✅ Existing data found and loaded for ${siteVal}!`, "#e8f5e9", "#1b5e20");

            document.getElementById('satTrans').value = data.transSat || '';
            document.getElementById('sunTrans').value = data.transSun || '';
            document.getElementById('totalTrans').value = data.transTotal || '';
            document.getElementById('satRev').value = data.revSat || '';
            document.getElementById('sunRev').value = data.revSun || '';
            document.getElementById('totalRev').value = data.revTotal || '';
            document.getElementById('incidents').value = data.incident || '';
            document.getElementById('hrMatters').value = data.hrMatters || '';
            document.getElementById('buyBackTones').value = data.monthlyTonnes || '';
            document.getElementById('buyBackNotes').value = data.buyBackComments || '';
            document.getElementById('adhocTasks').value = data.adhoc || '';
            document.getElementById('anyIssues').value = data.anyIssues || '';
            document.getElementById('anythingExtra').value = data.notes || '';
        } else {
            // 3. Fresh Record State
            showStatus(`🆕 No saved data found for ${siteVal} on this date. Ready for fresh entry.`, "#fff3e0", "#e65100");
        }
    })
    .catch(error => {
        showStatus("❌ Error linking to database. Check connection.", "#ffefee", "#c62828");
        console.error('Error fetching data:', error);
    });
}

function sendData(statusType) {
    if(!document.getElementById('date').value || !document.getElementById('site').value) {
        alert('Please select a Date and a Site.');
        return;
    }

    showStatus("⏳ Submitting report to spreadsheet...", "#f5f5f5", "#333333");

    const formData = {
        dateWEnd: document.getElementById('date').value,
        site: document.getElementById('site').value,
        transSat: document.getElementById('satTrans').value,
        transSun: document.getElementById('sunTrans').value,
        transTotal: document.getElementById('totalTrans').value,
        revSat: document.getElementById('satRev').value,
        revSun: document.getElementById('sunRev').value,
        revTotal: document.getElementById('totalRev').value,
        incident: document.getElementById('incidents').value,
        hrMatters: document.getElementById('hrMatters').value,
        monthlyTonnes: document.getElementById('buyBackTones').value,
        buyBackComments: document.getElementById('buyBackNotes').value,
        adhoc: document.getElementById('adhocTasks').value,
        anyIssues: document.getElementById('anyIssues').value,
        notes: document.getElementById('anythingExtra').value
    };

    fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        cache: 'no-cache',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(formData)
    })
    .then(() => {
        showStatus("🚀 Report logged successfully!", "#e8f5e9", "#1b5e20");
        alert('Report logged successfully to WeekendingData.');
        document.getElementById('reportForm').reset();
        setTimeout(hideStatus, 5000); // Hide banner after 5 seconds
    })
    .catch(err => {
        showStatus("❌ Submission failed.", "#ffefee", "#c62828");
        console.error(err);
    });
}
</script>
</body>
</html>
